<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Management</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            color: #333;
        }
        form {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            background: #007bff;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #007bff;
            color: white;
        }
        tr:nth-child(even) {
            background: #f9f9f9;
        }
        tr:hover {
            background: #f1f1f1;
        }
        .severity-low { color: green; }
        .severity-medium { color: orange; }
        .severity-high { color: red; }
        .severity-critical { color: darkred; font-weight: bold; }
        .status-open { color: red; }
        .status-in_progress { color: orange; }
        .status-resolved { color: green; }
    </style>
</head>
<body>
    <h1>Incident Management</h1>

    <h2>Create New Incident</h2>
    <form id="incident-form" onsubmit="event.preventDefault(); createIncident();">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="3" required></textarea>

        <label for="severity">Severity</label>
        <select id="severity" name="severity" required>
            <option value="">Select severity</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
            <option value="critical">Critical</option>
        </select>

        <label for="status">Status</label>
        <select id="status" name="status" required>
            <option value="">Select status</option>
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="resolved">Resolved</option>
        </select>

        <label for="site_id">Site</label>
        <select id="site_id" name="site_id" required>
            <option value="">Select site</option>
            {% for site in sites %}
            <option value="{{ site.id }}">{{ site.name }}</option>
            {% endfor %}
        </select>

        <button type="submit">Create Incident</button>
    </form>

    <h2>Incidents</h2>
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Description</th>
                <th>Severity</th>
                <th>Status</th>
                <th>Site</th>
                <th>Created At</th>
            </tr>
        </thead>
        <tbody id="incidents-body">
            <tr>
                <td>ID</td>
                <td>Title</td>
                <td>Description</td>
                <td class="severity-low">Low</td>
                <td class="status-open">Open</td>
                <td>Site Name</td>
                <td>Created At</td>
            </tr>
        </tbody>
    </table>

    <script src="/static/index.js"></script>
</body>
</html>
